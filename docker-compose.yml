version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - DATABASE_URL=sqlite:///./data/HackerLabAcademy.db
      - CVE_SCHEDULED_FETCH=${CVE_SCHEDULED_FETCH:-false}
    volumes:
      - backend_data:/app/data
      - backend_audio:/app/backend/audio
      - backend_exports:/app/backend/exports
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8001
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health').read()"]
      interval: 30s
      timeout: 40s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
  backend_audio:
  backend_exports:
